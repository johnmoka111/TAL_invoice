name: tal_invoice
description: "TAL Invoice - Application de facturation offline-first pour entrepreneurs."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter

  # State Management
  flutter_bloc: ^8.1.6
  equatable: ^2.0.5

  # Database locale
  sqflite: ^2.3.3
  path: ^1.9.0

  # Navigation
  go_router: ^14.2.0

  # Persistance légère (check profil)
  shared_preferences: ^2.2.3

  # Utilitaires
  uuid: ^4.4.0
  intl: ^0.19.0
  path_provider: ^2.1.3

  # Sélection d'image (logo entreprise)
  image_picker: ^1.1.2

  # Génération PDF
  pdf: ^3.11.1
  printing: ^5.12.0

  cupertino_icons: ^1.0.8
  url_launcher: ^6.3.2
  flutter_staggered_animations: ^1.1.1
  flutter_animate: ^4.5.2
  flutter_svg: ^2.2.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.13.1

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/images/logo_talhub.png"
  min_sdk_android: 21

flutter:
  uses-material-design: true
  assets:
    - assets/images/
